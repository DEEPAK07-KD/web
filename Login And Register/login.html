<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            background: #EEAECA;
            background: linear-gradient(18deg, rgba(238, 174, 202, 1) 38%, rgba(148, 187, 233, 1) 100%);
            background-attachment: fixed;
            margin: 0;
        }
        form{
            width: 400px;
            margin: 60vh ;
            padding: 40px;
            /* padding-: 100px; */
            border: 1px solid grey;
            background-color: white;
            border-radius: 15px;
            /* padding-top: -100px; */
        }
        div{
            display: flex;
            flex-direction: column;
            /* padding: 20px; */
            
            /* border-radius: 15px; */
            /* width: 400px; */
            height: 450px;
            /* padding-top: 10%; */
            /* padding: 10%; */
            
        }
        div input{
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 20px;
            margin-top: 5px;
        }
        div button{
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 20px;
            margin-top: 5px;
            background-color: #0F172A;
            color: white;
            transition: .02s;
        }
        button:hover{
            transform: translateY(-10px);
            background-color: lightgreen;
        }
        h1,a{
            text-align: center;
        }
        a:hover{
            color: blue;
        }
    </style>
</head>
<body>
    <form action="">
    <div>
        <h1><span style="color: lightskyblue;">Welcome</span> Back</h1>
        <label for="">UserName : </label>
        <input type="text" name="" id="" >
        <label for="">Password</label>
        <input type="password" name="" id="">
        <button>Login</button>
        <a href="./RegistrationForm.html">"New User? Register here"</a>

    </div>
    </form>
</body>
</html>
