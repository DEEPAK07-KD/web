<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body{
            background: #2A7B9B;
    background: linear-gradient(1deg, rgba(42, 123, 155, 1) 24%, rgba(199, 87, 160, 1) 100%);
    background-attachment: fixed;
    margin: 0;
    font-family: 'poppins',sans-serif;
        }
        .form{
            width: 400px;
            margin: 10vh auto;
            background-color: white;
            border-radius: 5px;
            padding: 30px;
        }
        h1{
            text-align: center;
            color: #792099;

        }
        .form button{
            background-color: #792099;
            color: white;
            width: 100%;
            border: 1px solid #732099;
            border-radius: 5px;
            padding: 10px;
            margin: 5px 0px;
            font-size: 15px;
            cursor:pointer;
        }
        .input-group{
            display: flex;
            flex-direction: column;
            margin-bottom: 1px;
        }
        .input-group input{
            border-radius: 5px;
            font-size: 18px;
            margin-top: 5px;
            padding: 5px;
            border: 1px solid rgb(34, 193, 195);
        }
        .input-group input:focus{
            outline: 0;
        }
        
    </style>
</head>
<body >
    <div class="con">
        <form action="" class="form">

        
    <h1>Registration Form</h1>
    <div class="input-group">
    <label for="Name">Full Name : </label>
    <input type="text" name="" id="Name" placeholder="Name"><br><br>
    </div>
    <div class="input-group">
    <label for="mail">Email ID :</label>
    <input type="email" name="" id="mail" placeholder="Email"><br><br>
    </div>
    <div class="input-group">
    <label for="uname">UserName :</label>
    <input type="text" name="" id="uname" placeholder="User Name"><br><br>
    </div>
    <div class="input-group">
    <label for="pass">Password :</label>
    <input type="password" name="" id="pass" placeholder="Password"><br><br>
    </div>
    <div class="input-group">
    <label for="cpass">Confirm Password :</label>
    <input type="password" name="" id="cpass" placeholder="Confirm Password"><br><br>
    </div>
    <div class="input-group">
    <label for="gen">Gender :</label>
    <input type="radio" name="g" id="" value="Male"><label for="">Male</label>
    <input type="radio" name="g" id="" value="Female"><label for="">Female</label>
    <input type="radio" name="g" id="" value="Others"><label for="">Others</label><br><br>
    </div>
    <div class="input-group">
    <label for="dob">Date Of Birth :</label>
    <input type="date" name="" id="dob" ><br><br>
    </div>
    <div class="input-group">
    <label for="mno">Mobile Nunber : </label>
    <input type="tel" name="" id="mno" placeholder="Mobile Number"><br><br>
    </div>
    <div class="input-group">
    <label for="add">Address</label>
    <textarea name="" id="add" placeholder="Put Your Perminant Address."></textarea><br><br>
    </div>
    <button type="submit">Register</button>
    <button type="reset">Reset/clear</button><br>
    <div class="input-group">
    <input type="checkbox" name="" id="" <p>The rules of engagement. This governs user conduct, account termination, intellectual property, and limits your legal liability.</p> 
     </div>
    </form>
    </div>
</body>
</html>
